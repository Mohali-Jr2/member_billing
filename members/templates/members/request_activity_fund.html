{% extends "members/base.html" %}
{% block content %}
<div class="page-title">
    <div class="title_left"><h3>Request Activity Funds</h3></div>
    <div class="title_right text-right">
        <a href="{% url 'activity_fund_requests' %}" class="btn btn-info">View Requests</a>
    </div>
</div>

<div class="x_panel">
    <div class="x_title"><h2>Request Money for Club Activity</h2><div class="clearfix"></div></div>
    <div class="x_content">
        <form method="post" novalidate>
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger">{{ field.errors }}</div>{% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-success">Submit Request</button>
        </form>
    </div>
</div>
{% endblock %}
