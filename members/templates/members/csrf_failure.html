<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Expired</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="mx-auto bg-white border rounded p-4" style="max-width: 640px;">
            <h1 class="h4 mb-3">This page expired</h1>
            <p>
                For security, Django rejected this form because the page had an old login token.
                This can happen after logging in again, using the browser back button, or leaving a form open for a while.
            </p>
            {% if reason %}
                <p class="text-muted mb-4">Reason: {{ reason }}</p>
            {% endif %}
            <div class="d-flex flex-wrap">
                <a class="btn btn-primary mr-2 mb-2" href="{{ request.META.HTTP_REFERER|default:'/' }}">Reload the form</a>
                <a class="btn btn-secondary mb-2" href="{% url 'dashboard' %}">Go to dashboard</a>
            </div>
        </div>
    </main>
</body>
</html>
